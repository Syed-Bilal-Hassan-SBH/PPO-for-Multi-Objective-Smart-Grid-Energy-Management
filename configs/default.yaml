# Default Configuration for PPO Smart Grid Project

training:
  total_timesteps: 1000000
  rollout_steps: 2048
  learning_rate: 3e-4
  learning_rate_schedule: "linear"  # 'constant', 'linear', or 'exponential'
  n_epochs: 10
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  clip_ratio_vf: 0.02  # NEW: Value function clipping
  entropy_coef: 0.01
  entropy_coef_schedule: "linear"  # NEW: 'constant', 'linear', or 'exponential'
  value_coef: 0.5
  max_grad_norm: 0.5
  eval_interval: 10
  save_interval: 10
  eval_episodes: 5
  seed: 42

environment:
  name: "citylearn"
  n_buildings: 5
  normalize_obs: true
  clip_actions: true
  clip_obs: 10.0  # NEW: Clip normalized observations
  track_metrics: true
  use_safety_constraints: true

reward:
  weight_cost: 0.4
  weight_carbon: 0.2
  weight_peak: 0.2
  weight_health: 0.2
  normalize_components: true
  baseline_cost: 1.0
  baseline_carbon: 1.0
  baseline_peak: 1.0
  constraint_penalty: -100.0
  normalize_reward: true  # NEW
  clip_reward: 10.0  # NEW

network:
  hidden_sizes: [128, 128]  # UPDATED from [64, 64]
  activation: "tanh"
  log_std_init: 0.0
  use_orthogonal_init: true

logging:
  log_dir: "results/logs"
  checkpoint_dir: "results/checkpoints"
  plot_dir: "results/plots"
  log_interval: 100
  use_tensorboard: true
  tensorboard_dir: "results/tensorboard"

# Offline pre-training configuration
offline_pretraining:
  enabled: false  # Disabled temporarily - focus on main PPO training
  n_episodes: 100  # Episodes to collect with rule-based baseline
  n_training_steps: 5000  # IQL training steps
  batch_size: 32
  learning_rate: 1e-3
  
# NEW SECTION: Ablation study configuration
ablation:
  # Set to non-null to override default weights
  weight_cost: null
  weight_carbon: null
  weight_peak: null
  weight_health: null
