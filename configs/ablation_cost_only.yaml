# Ablation Study: Cost Optimization Only
# Tests whether agent can maximize pure cost reduction

training:
  total_timesteps: 500000
  rollout_steps: 2048
  learning_rate: 3e-4
  learning_rate_schedule: "linear"
  n_epochs: 10
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  clip_ratio_vf: 0.02
  entropy_coef: 0.01
  entropy_coef_schedule: "linear"
  value_coef: 0.5
  max_grad_norm: 0.5
  eval_interval: 10
  save_interval: 10
  eval_episodes: 5
  seed: 42

environment:
  name: "citylearn"
  n_buildings: 5
  normalize_obs: true
  clip_actions: true
  clip_obs: 10.0
  track_metrics: true
  use_safety_constraints: true

reward:
  weight_cost: 1.0
  weight_carbon: 0.0
  weight_peak: 0.0
  weight_health: 0.0
  normalize_components: true
  baseline_cost: 1.0
  normalize_reward: true
  clip_reward: 10.0

network:
  hidden_sizes: [128, 128]
  activation: "tanh"
  log_std_init: 0.0
  use_orthogonal_init: true

logging:
  log_dir: "results/logs/ablation_cost_only"
  checkpoint_dir: "results/checkpoints/ablation_cost_only"
  plot_dir: "results/plots"
  log_interval: 100
  use_tensorboard: true
  tensorboard_dir: "results/tensorboard/ablation_cost_only"
